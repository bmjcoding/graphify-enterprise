name: Security

on:
  push:
    branches: ["main", "v*"]
  pull_request:
    branches: ["main", "v*"]
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  python-security:
    name: Python SAST and SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[mcp,pdf,watch,sql]"
          python -m pip install "bandit[toml]" pip-audit cyclonedx-bom

      - name: Bandit SAST
        run: python -m bandit -r graphify -c pyproject.toml --severity-level medium --confidence-level medium

      - name: pip-audit SCA
        run: python -m pip_audit . --strict --desc off

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format JSON --output-file sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
